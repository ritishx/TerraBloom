    <style>
        /* Define custom Tailwind colors and fonts */
        :root {
            --color-green: #4CAF50;
            /* Earthy Forest Green */
            --color-beige: #F5F5DC;
            /* Soft Beige */
            --color-pink: #F08080;
            /* Blush Pink */
        }

        .bg-cream {
            background-color: var(--color-beige);
        }

        .text-green {
            color: var(--color-green);
        }

        .bg-green {
            background-color: var(--color-green);
        }

        .text-pink {
            color: var(--color-pink);
        }

        .bg-pink {
            background-color: var(--color-pink);
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        .font-poppins {
            font-family: 'Poppins', sans-serif;
        }

        /* General styling adjustments */
        body {
            background-color: var(--color-beige);
            font-family: 'Poppins', sans-serif;
            color: #333;
            /* Dark gray text */
            scroll-behavior: smooth;
        }

        /* Custom scrollbar style for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-pink);
        }

        /* Utility class for button hover - Green to Pink */
        .btn-primary {
            @apply bg-green text-white font-semibold py-3 px-8 rounded-full transition-all duration-300 shadow-md;
        }

        .btn-primary:hover {
            @apply bg-pink shadow-lg transform scale-[1.02];
        }

        /* Custom Card shadow and transition for luxury feel */
        .product-card {
            @apply bg-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 overflow-hidden;
        }

        /* Subtle Fade-in Animation */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

            currentProduct: null,
            filters: { category: 'All', brand: 'All', minPrice: 0, maxPrice: 30000, minRating: 0 }

        // --- 2. CORE UTILITIES ---

        /** Utility function to format price as Indian Rupees (INR) */
        const formatINR = (price) => `₹${price.toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;

        /** Updates cart in state and localStorage */
        const updateCart = (newCart) => {
            state.cart = newCart;
            localStorage.setItem('terraBloomCart', JSON.stringify(state.cart));
            renderNavbar(); // Re-render navbar to update cart count
        };

        /** Adds a product to the cart or increments quantity */
        const addToCart = (productId, quantity = 1) => {
            const product = MOCK_PRODUCTS.find(p => p.id === productId);
            if (!product || !product.availability) {
                alertMessage(`Sorry, ${product.name} is currently out of stock.`, 'info');
                return;
            }

            const existingItem = state.cart.find(item => item.id === productId);

            let newCart;
            if (existingItem) {
                newCart = state.cart.map(item =>
                    item.id === productId ? { ...item, quantity: item.quantity + quantity } : item
                );
            } else {
                newCart = [...state.cart, { ...product, quantity }];
            }

            updateCart(newCart);
            alertMessage(`Added ${quantity} x ${product.name} to Cart!`, 'success');
        };

        /** Updates the quantity of a product in the cart */
        const updateCartQuantity = (productId, newQuantity) => {
            let newCart = state.cart.filter(item => item.id !== productId);
            if (newQuantity > 0) {
                const item = state.cart.find(item => item.id === productId);
                if (item) {
                    newCart.push({ ...item, quantity: newQuantity });
                }
            }
            updateCart(newCart);
            renderCart();
        };

        /** Calculates total items in cart */
        const getCartCount = () => state.cart.reduce((total, item) => total + item.quantity, 0);

        /** Simple custom alert/message box implementation */

            const alertHtml = `
                <div id="alert-message" class="fixed top-20 right-4 p-4 rounded-lg shadow-xl text-white font-semibold transition-all duration-300 transform translate-y-0 opacity-100 ${bgColor} z-[100]">
                    ${message}
                </div>
            `;
            container.insertAdjacentHTML('afterend', alertHtml);

            setTimeout(() => {
                const el = document.getElementById('alert-message');
                if (el) {
                    el.classList.add('opacity-0', 'translate-y-[-20px]');
                    el.addEventListener('transitionend', () => el.remove());
                }
            }, 3000);
        };

        const renderStarRating = (rating) => {
            const fullStars = Math.floor(rating);
            let stars = '';
            for (let i = 0; i < 5; i++) {
                if (i < fullStars) {
                    stars += `<i class="fa-solid fa-star text-pink text-sm"></i>`;
                } else if (i === fullStars && (rating % 1 !== 0)) {
                    stars += `<i class="fa-solid fa-star-half-stroke text-pink text-sm"></i>`;
                } else {
                    stars += `<i class="fa-regular fa-star text-pink/50 text-sm"></i>`;
                }
            }
            return stars;
        };

                <nav class="flex justify-between items-center p-4 md:p-6 lg:px-12">

                    <a href="#" onclick="navigate('home')" class="flex items-center space-x-2">

                        <label class="block font-semibold mb-2">Brand</label>

                                                <button onclick="updateCartQuantity(${item.id}, ${item.quantity - 1})" class="p-2 text-green hover:bg-gray-100 rounded-l-lg"><i class="fa-solid fa-minus"></i></button>
                                                <span class="px-3 font-semibold text-gray-800">${item.quantity}</span>
                                                <button onclick="updateCartQuantity(${item.id}, ${item.quantity + 1})" class="p-2 text-green hover:bg-gray-100 rounded-r-lg"><i class="fa-solid fa-plus"></i></button>
                                            </div>
                                            <!-- Remove Button -->
                                            <button onclick="updateCartQuantity(${item.id}, 0)" class="text-pink hover:text-red-600 transition-colors p-2 rounded-full">
                                                <i class="fa-solid fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <!-- Order Summary (1/3 width) -->
                            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-xl h-fit border border-green/30">
                                <h3 class="font-playfair text-2xl font-bold text-green mb-6 border-b pb-3">Order Summary</h3>
                                <div class="space-y-3 font-poppins text-gray-700">
                                    <div class="flex justify-between">
                                        <span>Subtotal (${getCartCount()} items)</span>
                                        <span class="font-semibold">${formatINR(subtotal)}</span>
                                    </div>
                                    <div class="flex justify-between border-b pb-3">
                                        <span>Shipping</span>
                                        <span class="font-semibold text-pink">${shipping === 0 ? 'FREE (Over ' + formatINR(FREE_SHIPPING_THRESHOLD) + ')' : formatINR(shipping)}</span>
                                    </div>
                                    <div class="flex justify-between pt-3 text-xl font-bold text-gray-800">
                                        <span>Estimated Total</span>
                                        <span class="text-green">${formatINR(total)}</span>
                                    </div>
                                </div>
                                
                                <button class="btn-primary w-full mt-8" onclick="navigate('checkout')">
                                    Proceed to Checkout <i class="fa-solid fa-credit-card ml-2"></i>
                                </button>
                            </div>
                        </div>
                    `}
                </div>
            `;
            document.getElementById('app-content').innerHTML = cartHtml;
        };

        const renderCheckout = () => {
            const subtotal = state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const FREE_SHIPPING_THRESHOLD = 4000;
            const SHIPPING_COST = 300;
            const shipping = subtotal > 0 && subtotal < FREE_SHIPPING_THRESHOLD ? SHIPPING_COST : 0.00;
            const total = subtotal + shipping;

            if (state.cart.length === 0) {
                alertMessage('Your cart is empty. Redirecting to shop.', 'info');
                return navigate('shop');
            }

            const checkoutHtml = `
                <div class="max-w-5xl mx-auto py-12 fade-in">
                    <h1 class="font-playfair text-4xl text-center text-green font-bold mb-10">Secure Checkout</h1>

                    <!-- Checkout Steps (Mock Progress Bar) -->
                    <div class="flex justify-between items-center mb-10 text-center font-poppins max-w-lg mx-auto">
                        <div class="flex flex-col items-center">
                            <div class="w-10 h-10 rounded-full bg-pink text-white flex items-center justify-center font-bold mb-1">1</div>
                            <span class="text-sm font-semibold text-green">Shipping</span>
                        </div>
                        <div class="h-0.5 w-1/3 bg-green/50"></div>
                        <div class="flex flex-col items-center">
                            <div class="w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center font-bold mb-1">2</div>
                            <span class="text-sm text-gray-600">Review</span>
                        </div>
                        <div class="h-0.5 w-1/3 bg-gray-300"></div>
                        <div class="flex flex-col items-center">
                            <div class="w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center font-bold mb-1">3</div>
                            <span class="text-sm text-gray-600">Payment</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <!-- Billing & Shipping Form (2/3 width) -->
                        <div class="lg:col-span-2 bg-white p-8 rounded-xl shadow-xl">
                            <h2 class="font-playfair text-3xl font-bold text-gray-800 mb-6">Shipping Information</h2>
                            <form id="shipping-form" onsubmit="event.preventDefault(); handleCheckoutSubmit();" class="space-y-4">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <input type="text" placeholder="First Name" required class="form-input">
                                    <input type="text" placeholder="Last Name" required class="form-input">
                                    <input type="email" placeholder="Email Address" required class="form-input col-span-full">
                                </div>
                                <input type="text" placeholder="Street Address" required class="form-input">
                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                    <input type="text" placeholder="City" required class="form-input">
                                    <input type="text" placeholder="State/Province" required class="form-input">
                                    <input type="text" placeholder="Zip/Postal Code" required class="form-input">
                                </div>
                                
                                <h2 class="font-playfair text-3xl font-bold text-gray-800 pt-8 mb-6 border-t mt-8">Payment Details (Mock)</h2>
                                <div class="space-y-4">
                                    <div class="flex items-center p-3 border border-pink/50 rounded-lg bg-pink/5">
                                        <i class="fa-solid fa-credit-card text-2xl text-pink mr-3"></i>
                                        <span class="font-semibold text-gray-700">Mock Payment Gateway Active. No real payment will be processed.</span>
                                    </div>
                                    <input type="text" placeholder="Card Number" class="form-input" required pattern="[0-9]{16}" title="16 digits required">
                                    <div class="grid grid-cols-3 gap-4">
                                        <input type="text" placeholder="MM/YY" class="form-input" required pattern="(0[1-9]|1[0-2])\/\d{2}" title="Format MM/YY">
                                        <input type="text" placeholder="CVC" class="form-input" required pattern="[0-9]{3,4}" title="3 or 4 digits required">
                                        <input type="text" placeholder="Name on Card" class="form-input" required>
                                    </div>
                                </div>

                                <button type="submit" class="btn-primary w-full py-4 mt-8 text-lg">
                                    Place Order - ${formatINR(total)}
                                </button>
                            </form>
                        </div>

                        <!-- Order Summary (1/3 width) -->
                        <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-xl h-fit border border-green/30">
                            <h3 class="font-playfair text-2xl font-bold text-green mb-6 border-b pb-3">Order Summary</h3>
                            <div class="space-y-3 font-poppins text-gray-700">
                                ${state.cart.map(item => `
                                    <div class="flex justify-between text-sm">
                                        <span class="truncate">${item.quantity} x ${item.name}</span>
                                        <span class="font-semibold">${formatINR(item.price * item.quantity)}</span>
                                    </div>
                                `).join('')}
                                <div class="border-t border-gray-200 pt-3 mt-3"></div>
                                <div class="flex justify-between">
                                    <span>Subtotal</span>
                                    <span class="font-semibold">${formatINR(subtotal)}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Shipping</span>
                                    <span class="font-semibold text-pink">${shipping === 0 ? 'FREE' : formatINR(shipping)}</span>
                                </div>
                                <div class="flex justify-between pt-4 text-xl font-bold text-gray-800 border-t border-gray-200 mt-4">
                                    <span>Order Total</span>
                                    <span class="text-green">${formatINR(total)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <style>
                    /* Custom input styling for checkout form */
                    .form-input {
                        @apply w-full p-3 border border-gray-300 rounded-lg focus:ring-pink focus:border-pink transition-all font-poppins;
                    }
                </style>
            `;
            document.getElementById('app-content').innerHTML = checkoutHtml;
        };

        const handleCheckoutSubmit = () => {
            // Mock submission and clearing the cart
            alertMessage('Order Placed Successfully! Your order will be confirmed via email.', 'success');
            updateCart([]); // Clear cart
            // Mock delay before redirecting
            setTimeout(() => {
                navigate('home');
            }, 3000);
        };

        const renderAbout = () => {
            const aboutHtml = `
                <div class="max-w-4xl mx-auto py-12 fade-in">
                    <h1 class="font-playfair text-4xl md:text-5xl text-center text-green font-bold mb-12">Our Story: Where Authenticity Blooms</h1>

                    <div class="bg-white p-8 rounded-2xl shadow-xl mb-12 border-t-8 border-pink">
                        <p class="text-gray-700 text-lg leading-relaxed mb-6">
                            TerraBloom was founded on a simple belief: that true beauty is cultivated from nature's purest elements. We are more than just a marketplace; we are a curation of global beauty brands committed to ethical sourcing, innovation, and genuine results. Our name is derived from 'Terra' (Earth) and 'Bloom' (Growth), symbolizing our dedication to natural elegance and positive transformation.
                        </p>
                        <p class="text-gray-700 text-lg leading-relaxed">
                            We bridge the gap between premium self-care and earth-conscious living, providing a space where modern beauty lovers can discover products that feel luxurious, perform flawlessly, and respect the planet. We proudly feature brands like **MAC, Dior, The Ordinary, and Olaplex**, carefully vetting their commitment to quality and sustainability.
                        </p>
                    </div>

                    <!-- Values Section -->
                    <h2 class="font-playfair text-3xl text-center text-green font-bold mb-8">Our Core Values</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                        <div class="p-6">
                            <i class="fa-solid fa-seedling text-5xl text-green mb-4"></i>
                            <h3 class="font-playfair text-2xl font-semibold mb-3">Eco-Conscious</h3>
                            <p class="text-gray-600">Prioritizing sustainable ingredients, minimal waste, and recyclable packaging across all our partner brands.</p>
                        </div>
                        <div class="p-6">
                            <i class="fa-solid fa-user-group text-5xl text-pink mb-4"></i>
                            <h3 class="font-playfair text-2xl font-semibold mb-3">Inclusive Beauty</h3>
                            <p class="text-gray-600">A commitment to offering diverse products that cater to all skin tones, hair types, and unique beauty needs.</p>
                        </div>
                        <div class="p-6">
                            <i class="fa-solid fa-paw text-5xl text-green mb-4"></i>
                            <h3 class="font-playfair text-2xl font-semibold mb-3">Cruelty-Free</h3>
                            <p class="text-gray-600">Every product we sell is 100% cruelty-free. We believe beauty should never come at the expense of animals.</p>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('app-content').innerHTML = aboutHtml;
        };

        const renderContact = () => {
            const contactHtml = `
                <div class="max-w-3xl mx-auto py-12 fade-in">
                    <h1 class="font-playfair text-4xl md:text-5xl text-center text-green font-bold mb-12">Connect With Nature</h1>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 bg-white p-8 rounded-2xl shadow-xl">
                        <!-- Contact Form -->
                        <div>
                            <h2 class="font-playfair text-3xl font-bold text-gray-800 mb-6">Send Us a Message</h2>
                            <form onsubmit="event.preventDefault(); alertMessage('Message Sent! We will get back to you within 48 hours.', 'success'); this.reset();" class="space-y-4">
                                <input type="text" placeholder="Your Name" required class="form-input p-3">
                                <input type="email" placeholder="Your Email" required class="form-input p-3">
                                <textarea rows="4" placeholder="Your Message" required class="form-input p-3 resize-none"></textarea>
                                <button type="submit" class="btn-primary w-full">Submit Inquiry</button>
                            </form>
                        </div>

                        <!-- Info & Subscription -->
                        <div class="pt-8 lg:pt-0">
                            <h2 class="font-playfair text-3xl font-bold text-gray-800 mb-6">Contact Information</h2>
                            <div class="space-y-4 text-gray-700">
                                <p><i class="fa-solid fa-envelope text-green mr-3"></i> <a href="mailto:support@terrabloom.com" class="hover:text-pink transition-colors">support@terrabloom.com</a></p>
                                <p><i class="fa-solid fa-phone text-green mr-3"></i> <a href="tel:+91-800-400-0000" class="hover:text-pink transition-colors">+91 800 400 0000 (Mon-Fri)</a></p>
                                <p><i class="fa-solid fa-location-dot text-green mr-3"></i> Global Headquarters: Earthly Beauty Ave, New Delhi, India</p>
                            </div>

                            <div class="mt-8 border-t pt-6">
                                <h3 class="font-playfair text-2xl font-bold text-pink mb-4">Join The Bloom!</h3>
                                <p class="text-sm text-gray-600 mb-3">Subscribe for exclusive offers and sustainable beauty tips.</p>
                                <form onsubmit="event.preventDefault(); alertMessage('Thank you for subscribing!', 'success'); this.reset();" class="flex">
                                    <input type="email" placeholder="Enter your email" required class="form-input p-3 rounded-r-none flex-1">
                                    <button type="submit" class="bg-pink text-white font-semibold px-4 rounded-r-lg hover:bg-green transition-colors duration-300">Subscribe</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <style>
                    /* Custom input styling for contact form */
                    .form-input {
                        @apply w-full p-3 border border-gray-300 rounded-lg focus:ring-pink focus:border-pink transition-all font-poppins;
                    }
                </style>
            `;
            document.getElementById('app-content').innerHTML = contactHtml;
        };

        /** Main rendering function */
        const renderPage = () => {
            renderNavbar();
            switch (state.currentPage) {
                case 'shop':
                    renderShop();
                    break;
                case 'product':
                    renderProductDetail();
                    break;
                case 'cart':
                    renderCart();
                    break;
                case 'checkout':
                    renderCheckout();
                    break;
                case 'about':
                    renderAbout();
                    break;
                case 'contact':
                    renderContact();
                    break;
                case 'home':
                default:
                    renderHome();
                    break;
            }
        };

        // --- 5. INITIALIZATION ---

        window.onload = () => {
            renderFooter();
            renderPage();
        };

    </script>
</body>

</html>
